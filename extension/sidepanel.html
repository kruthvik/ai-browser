<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #06080f;
            --bg-secondary: #0c1120;
            --bg-card: rgba(15, 22, 40, 0.75);
            --border: rgba(99, 137, 255, 0.08);
            --border-active: rgba(99, 137, 255, 0.25);
            --text-primary: #e2e8f0;
            --text-secondary: #64748b;
            --text-muted: #3e4a63;
            --accent: #6389ff;
            --accent-glow: rgba(99, 137, 255, 0.35);
            --user-gradient-start: #6389ff;
            --user-gradient-end: #38bdf8;
            --ai-bg: rgba(16, 185, 129, 0.06);
            --ai-border: rgba(16, 185, 129, 0.12);
            --ai-text: #6ee7b7;
            --green: #22c55e;
            --red: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle noise overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 137, 255, 0.06), transparent);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        /* ─── Header ─── */
        .header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(6, 8, 15, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 30px;
            height: 30px;
            border-radius: 9px;
            background: linear-gradient(135deg, var(--user-gradient-start), var(--user-gradient-end));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px var(--accent-glow);
        }
        .logo-icon svg { width: 16px; height: 16px; }

        .logo-text {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-primary);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px 4px 8px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            transition: all 0.4s ease;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--red);
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
            transition: all 0.4s ease;
        }
        .status-dot.connected {
            background: var(--green);
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
            animation: softPulse 2.5s ease-in-out infinite;
        }

        /* ─── Chat ─── */
        .chat-container {
            position: relative;
            z-index: 1;
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 12px;
            opacity: 0.5;
            animation: fadeIn 0.6s ease;
        }
        .empty-state-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .empty-state-icon svg { width: 20px; height: 20px; color: var(--text-muted); }
        .empty-state p { font-size: 12px; color: var(--text-muted); font-weight: 500; }

        /* Messages */
        .msg-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: slideUp 0.25s ease-out;
        }
        .msg-wrapper.user { align-items: flex-end; }
        .msg-wrapper.ai, .msg-wrapper.system, .msg-wrapper.tool { align-items: flex-start; }

        .msg-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 4px;
        }
        .msg-wrapper.user .msg-label { color: var(--accent); }
        .msg-wrapper.ai .msg-label { color: #34d399; }
        .msg-wrapper.system .msg-label { color: var(--text-muted); }
        .msg-wrapper.tool .msg-label { color: #eab308; }

        .msg-bubble {
            max-width: 88%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg-wrapper.user .msg-bubble {
            background: linear-gradient(135deg, var(--user-gradient-start), var(--user-gradient-end));
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 20px rgba(99, 137, 255, 0.2);
        }

        .msg-wrapper.ai .msg-bubble {
            background: var(--ai-bg);
            border: 1px solid var(--ai-border);
            color: var(--ai-text);
            border-bottom-left-radius: 4px;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 12px;
        }

        .msg-wrapper.system .msg-bubble {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-bottom-left-radius: 4px;
            font-size: 12px;
            font-style: italic;
        }

        .msg-wrapper.tool .msg-bubble {
            background: rgba(234, 179, 8, 0.05);
            border: 1px solid rgba(234, 179, 8, 0.2);
            color: #fcd34d;
            border-bottom-left-radius: 4px;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 11px;
        }

        /* ─── Input Area ─── */
        .input-area {
            position: relative;
            z-index: 10;
            padding: 12px 16px 16px;
        }

        /* Glow behind input */
        .input-area::before {
            content: '';
            position: absolute;
            inset: 0 24px 12px;
            background: linear-gradient(90deg, rgba(99,137,255,0.12), rgba(56,189,248,0.12));
            border-radius: 20px;
            filter: blur(20px);
            pointer-events: none;
        }

        .input-card {
            position: relative;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .input-card:focus-within {
            border-color: var(--border-active);
            box-shadow: 0 0 0 1px var(--border-active), 0 8px 30px rgba(99,137,255,0.08);
        }

        .input-card textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            min-height: 48px;
            max-height: 120px;
        }
        .input-card textarea::placeholder {
            color: var(--text-muted);
        }

        .input-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .execute-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--user-gradient-start), var(--user-gradient-end));
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 10px var(--accent-glow);
        }
        .execute-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .execute-btn:active {
            transform: scale(0.97) translateY(0);
        }
        .execute-btn svg { width: 14px; height: 14px; }

        /* ─── Animations ─── */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 0.5; }
        }
        @keyframes softPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(34,197,94,0.6); }
            50% { box-shadow: 0 0 3px rgba(34,197,94,0.3); }
        }
        /* ─── History Panel ─── */
        .history-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(6, 8, 15, 0.6);
            backdrop-filter: blur(4px);
            z-index: 40;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .history-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }

        .history-panel {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: rgba(12, 17, 32, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            z-index: 50;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .history-panel.open {
            transform: translateX(280px);
        }

        .history-header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .history-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .new-chat-btn {
            width: calc(100% - 40px);
            margin: 20px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(99, 137, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(99, 137, 255, 0.2);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .new-chat-btn:hover {
            background: rgba(99, 137, 255, 0.15);
            border-color: rgba(99, 137, 255, 0.3);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item {
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .history-item.active {
            background: rgba(99, 137, 255, 0.1);
            border-left: 2px solid var(--accent);
            border-radius: 0 10px 10px 0;
        }
        .history-item-title {
            font-size: 13px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item-date {
            font-size: 10px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="logo-group">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <span class="logo-text">AI Bridge</span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="status-badge">
                <div id="status" class="status-dot"></div>
                <span id="status-label">Offline</span>
            </div>
            
            <button id="history-btn" title="Chat History" style="background: none; border: none; cursor: pointer; padding: 4px; border-radius: 6px; display: flex; align-items: center; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='none'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="20" x2="12" y2="10"/>
                    <line x1="18" y1="20" x2="18" y2="4"/>
                    <line x1="6" y1="20" x2="6" y2="16"/>
                </svg>
            </button>

            <button id="settings-btn" title="Settings" style="background: none; border: none; cursor: pointer; padding: 4px; border-radius: 6px; display: flex; align-items: center; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='none'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Chat -->
    <main id="chat-log" class="chat-container">
        <div class="empty-state" id="empty-state">
            <div class="empty-state-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <p>Waiting for Python Engine…</p>
        </div>
    </main>

    <!-- Input -->
    <footer class="input-area">
        <div class="input-card">
            <textarea id="user-input" rows="2" placeholder="What should the AI do next?"></textarea>
            <div class="input-actions" style="display: flex; gap: 8px;">
                <button id="send-btn" class="execute-btn" style="display: flex;">
                    Execute
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
                <button id="stop-btn" class="execute-btn" style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: #ef4444; display: none;">
                    Stop
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect></svg>
                </button>
            </div>
        </div>
    </footer>

    <!-- History Sidebar -->
    <div id="history-backdrop" class="history-backdrop"></div>
    <div id="history-panel" class="history-panel">
        <div class="history-header">
            <span class="history-title">Chat History</span>
        </div>
        <button id="new-chat-btn" class="new-chat-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New Chat
        </button>
        <div id="history-list" class="history-list"></div>
    </div>

    <script src="sidepanel.js"></script>
</body>
</html>
